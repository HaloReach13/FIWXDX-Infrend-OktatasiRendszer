<div class="row justify-content-md-center">
    <div class="col-md-6">
        <h2 class="mb-4 text-center">Bejelentkezés</h2>
        <form [formGroup]="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">E-mail cím</label>
                <input type="email" class="form-control" id="email" formControlName="email">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Jelszó</label>
                <input type="password" class="form-control" id="password" formControlName="password">
            </div>
            <div class="text-center mt-3 mb-2">
                <p class="mb-0">Még nincs fiókja? <a routerLink="/register" class="text-decoration-none">Regisztráljon itt!</a></p>
            </div>
            
            <div class="text-center">
                <button class="btn btn-outline-primary" (click)="login()">Belépés</button>
            </div>
        </form>
    </div>
</div>
