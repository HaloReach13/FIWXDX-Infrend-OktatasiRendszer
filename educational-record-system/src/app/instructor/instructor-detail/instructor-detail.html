<div class="row">
    <div class="col-md-12">
        <h2>Oktatott tantárgyak</h2>
        @if(instructor()) {
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Kód</th>
                        <th>Tantárgy neve</th>
                        <th>Kredit</th>
                    </tr>
                </thead>
                <tbody>
                    @for(subject of subjects(); track subject.id) {
                        <tr>
                            <td>{{ subject.code }}</td>
                            <td>{{ subject.name }}</td>
                            <td>{{ subject.credits }}</td>
                        </tr>
                    }
                    @empty {
                        <tr>
                            <td colspan="4" class="text-center text-muted py-4">
                                <i class="bi bi-journal-x fs-4 d-block mb-2"></i>
                                Nincs hozzárendelt tantárgy.
                            </td>
                        </tr>
                    }
                </tbody>
            </table>
            <div class="text-end mt-4">
                <button class="btn btn-outline-secondary me-2" (click)="cancel()">Mégse</button>
            </div>
        } @else {
        <div class="text-center py-5 text-muted">
            <div class="spinner-border mb-3" role="status"></div>
            <p>Betöltés...</p>
        </div>
    }
    </div>
</div>
