<div class="row">
    <div class="col-md-12">
        <h2>Hallgatók</h2>
        <button class="btn btn-outline-success mb-2" (click)="createStudent()"><i class="bi bi-plus-lg"></i> Új hallgató hozzáadása</button>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Neptun kód</th>
                    <th>Keresztnévnév</th>
                    <th>Vezetéknév</th>
                    <th>Email</th>
                    <th>Tankör</th>
                    <th>Aktuális félév</th>
                    <th>Műveletek</th>
                </tr>
            </thead>
            <tbody>
                @for(student of students(); track student.id) {
                    <tr>
                        <td>{{ student.neptunCode }}</td>
                        <td>{{ student.firstName }}</td>
                        <td>{{ student.lastName }}</td>
                        <td>{{ student.email }}</td>
                        <td>{{ student.class }}</td>
                        <td>{{ student.currentSemester }}</td>
                        <td>
                            <button class="btn btn-outline-primary me-2" (click)="editStudent(student)"><i class="bi bi-pencil-square"></i></button>
                            <button class="btn btn-outline-danger" (click)="deleteStudent(student)"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>
                }
            </tbody>
        </table>
    </div>
</div>
